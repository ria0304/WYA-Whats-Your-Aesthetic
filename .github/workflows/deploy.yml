name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/WYA-Whats-Your-Aesthetic
            git pull origin main
            docker build -t wya-backend .
            docker stop wya || true
            docker rm wya || true
            docker run -d --name wya --restart unless-stopped -p 8000:8000 --env-file .env -e SAGEMAKER_ENDPOINT=wya-fashionclip-serverless -e AWS_REGION=ap-south-1 -v /home/ubuntu/wya-data:/app/data wya-backend

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - run: npm install
      - run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
          
      - run: aws s3 sync dist/ s3://wya-whats-your-aesthetic --delete
