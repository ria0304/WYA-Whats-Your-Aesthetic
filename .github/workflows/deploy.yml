name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/WYA-Whats-Your-Aesthetic
            git pull origin main
            docker build -t wya-backend .
            docker stop wya || true
            docker rm wya || true
            docker run -d --name wya --restart unless-stopped -p 8000:8000 --env-file .env -e SAGEMAKER_ENDPOINT=wya-fashionclip-serverless -e AWS_REGION=ap-south-1 -v /home/ubuntu/wya-data:/app/data wya-backend

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - run: npm install
      - run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── S3: Apply bucket policy for CloudFront OAC ──────────────────────────
      # This ensures CloudFront can read from S3 (fixes the 403 Access Denied)
      - name: Apply S3 bucket policy for CloudFront OAC
        run: |
          aws s3api put-bucket-policy \
            --bucket wya-whats-your-aesthetic \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "AllowCloudFrontOAC",
                  "Effect": "Allow",
                  "Principal": {
                    "Service": "cloudfront.amazonaws.com"
                  },
                  "Action": "s3:GetObject",
                  "Resource": "arn:aws:s3:::wya-whats-your-aesthetic/*",
                  "Condition": {
                    "StringEquals": {
                      "AWS:SourceArn": "arn:aws:cloudfront::${{ secrets.AWS_ACCOUNT_ID }}:distribution/${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
                    }
                  }
                }
              ]
            }'

      # ── S3: Block all public access (security — OAC handles it) ────────────
      - name: Block S3 public access
        run: |
          aws s3api put-public-access-block \
            --bucket wya-whats-your-aesthetic \
            --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=false"

      # ── S3: Sync — split into 3 passes with correct cache headers ──────────
      # index.html → no-cache (always fresh, forces browser to re-fetch on deploy)
      - name: Sync index.html (no-cache)
        run: |
          aws s3 cp dist/index.html s3://wya-whats-your-aesthetic/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # Hashed JS/CSS assets → cache for 1 year (hash changes = new URL)
      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/assets/ s3://wya-whats-your-aesthetic/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      # Everything else (manifest, icons, sw.js) → short cache
      - name: Sync static files (short cache)
        run: |
          aws s3 sync dist/ s3://wya-whats-your-aesthetic/ \
            --exclude "index.html" \
            --exclude "assets/*" \
            --cache-control "public, max-age=86400" \
            --delete

      # ── CloudFront: Only invalidate index.html + sw.js (not hashed assets) ─
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/sw.js" "/manifest.json"
